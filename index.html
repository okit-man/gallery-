<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
</head>
<body>
    <!-- mountain images -->
    <section class="section mountain">
        <img src="./images project/mountain-img-ones.jpg" alt="Mountain Image 1" class="img" title="mountain-1" data-id="1" style="width: 380px;" height="250px" >
        <img src="./images project/mountain-img-twos.jpg" alt="Mountain Image 2" class="img" title="mountain-2" data-id="2" style="width: 380px;" height="250px" >
        <img src="./images project/mountain-img-threes.jpg" alt="Mountain Image 3" class="img" title="mountain-3" data-id="3" style="width: 380px;" height="250px" >
    </section>
    <!-- city images -->
     <section class="section city">
        <img src="./images project/city-img-ones.jpg" alt="city image 1" class="img" title="city-1" data-id="1" style="width: 380px;" height="250px;">
        <img src="./images project/city-img-twos.jpg" alt="city image 2" class="img" title="city-2" data-id="2" style="width: 380px;" height="250px">
        <img src="./images project/city-img-fours.jpg" alt="city image 4" class="img" title="city-4" data-id="4" style="width: 380px;" height="250px">
        <img src="./images project/mountain-img-fives.jpg" alt="city image 5" class="img" title="city-5" data-id="5" style="width: 380px;" height="250px">
        <img src="./images project/mountain-img-sevens.jpg" alt="city image 7" class="img" title="city-7" data-id="7" style="width: 380px;" height="250px">
     </section>
     <!-- model -->
      <div class="model">
        <button type="button" class="close-btn">
            <i class="fa-solid fa-x"></i>
        </button>
        <div class="model-content">
            <!-- pre next previous -->
            <button type="button" class="pre-button">
                <i class="fa-solid fa-angle-left"></i>
            </button>
            <button type="button" class="next-button">
                <i class="fa-solid fa-angle-right"></i>
            </button>
            <!-- content -->
             <img src="./images project/city-img-ones.jpg" alt="" class='mini-img'>
             <h3 class="image-name">image name</h3>
             <div class="model-images">
                <img src="/images project/mountain-img-twos.jpg" 
                alt="Mountain Image 2" 
                class="modal-img" 
                title="mountain-2" 
                data-id="1" 
                >

                <img src="/images project/mountain-img-ones.jpg" 
                alt="Mountain Image 1" 
                class="modal-img selected" 
                title="mountain-1" 
                data-id="1" 
                 >
             </div>
        </div>
      </div>


      <script src="./app.js"></script>
</body>
</html>
